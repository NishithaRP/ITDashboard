<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2330;
  --border: #30363d;
  --accent: #00d4aa;
  --accent2: #0096ff;
  --danger: #f85149;
  --warning: #e3b341;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ===== LOGIN ===== */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at 30% 50%, #0a2a20 0%, #0d1117 60%);
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 0 60px rgba(0,212,170,0.08);
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}

.login-logo .company {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.login-logo h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
}

.login-logo .subtitle {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  transition: border-color 0.2s;
  outline: none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
}

.form-group select option { background: var(--surface); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius);
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: #0d1117;
  width: 100%;
  justify-content: center;
  padding: 12px;
}

.btn-primary:hover { background: #00f0c0; transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

.btn-danger {
  background: rgba(248,81,73,0.15);
  color: var(--danger);
  border: 1px solid rgba(248,81,73,0.3);
}

.btn-danger:hover { background: rgba(248,81,73,0.25); }

.btn-small { padding: 6px 12px; font-size: 12px; }

.login-error {
  background: rgba(248,81,73,0.12);
  border: 1px solid rgba(248,81,73,0.3);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

/* ===== MAIN APP ===== */
#main-app { display: none; min-height: 100vh; }

/* Header */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-brand {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}

.header-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
}

.location-badge {
  background: rgba(0,212,170,0.1);
  border: 1px solid rgba(0,212,170,0.3);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.header-right { display: flex; align-items: center; gap: 12px; }

.user-info { font-size: 13px; color: var(--text2); }

.btn-logout {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 14px;
  border-radius: var(--radius);
  font-size: 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}

.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* Location Tabs */
.location-tabs {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
}

.location-tabs::-webkit-scrollbar { height: 2px; }
.location-tabs::-webkit-scrollbar-thumb { background: var(--border); }

.loc-tab {
  padding: 12px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  border-radius: 6px 6px 0 0;
}

.loc-tab:hover { color: var(--text); background: var(--surface2); }

.loc-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: rgba(0,212,170,0.05);
}

/* Module Tabs */
.module-nav {
  background: var(--bg);
  padding: 16px 24px 0;
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
}

.mod-tab {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  border: 1px solid transparent;
  border-bottom: none;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.mod-tab:hover { color: var(--text); background: var(--surface); }

.mod-tab.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
  border-bottom-color: var(--surface);
  position: relative;
  bottom: -1px;
}

/* Content Area */
.content-area {
  padding: 24px;
  max-width: 1400px;
}

/* Section Header */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.section-title {
  font-size: 18px;
  font-weight: 700;
}

.section-subtitle {
  font-size: 13px;
  color: var(--text2);
  margin-top: 2px;
}

/* Cards & Tables */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}

.card-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  background: var(--surface2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

tbody tr:hover { background: var(--surface2); }

tbody td {
  padding: 10px 14px;
  color: var(--text);
  vertical-align: middle;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}

.badge-green { background: rgba(0,212,170,0.15); color: var(--accent); }
.badge-blue { background: rgba(0,150,255,0.15); color: var(--accent2); }
.badge-yellow { background: rgba(227,179,65,0.15); color: var(--warning); }
.badge-red { background: rgba(248,81,73,0.15); color: var(--danger); }
.badge-gray { background: rgba(139,148,158,0.15); color: var(--text2); }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}

.modal-title { font-size: 16px; font-weight: 700; }

.modal-body { padding: 24px; }

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.btn-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 2px;
}

.btn-close:hover { color: var(--text); }

/* Form Grid */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-grid .span2 { grid-column: span 2; }
.form-grid .span3 { grid-column: span 3; }

@media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .span2 { grid-column: span 1; }
}

/* WiFi specific */
.wifi-connection-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.wifi-connection-header {
  background: var(--surface2);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.wifi-conn-name { font-weight: 700; font-size: 15px; }
.wifi-conn-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

.wifi-months-table { width: 100%; }

.add-month-row {
  background: rgba(0,212,170,0.03);
  border-top: 1px dashed var(--border);
}

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }
.stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; color: var(--accent); }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* Checkbox groups */
.checkbox-group {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 0;
}

.checkbox-group input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}

.checkbox-group label {
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
  font-weight: 400;
}

/* Conditional fields */
.conditional-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 8px;
}

.conditional-section .section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text2);
}

.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 13px; }

/* Search */
.search-bar {
  position: relative;
  max-width: 300px;
}

.search-bar input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px 8px 36px;
  color: var(--text);
  font-size: 13px;
  width: 100%;
  outline: none;
  font-family: 'DM Sans', sans-serif;
}

.search-bar input:focus { border-color: var(--accent); }

.search-bar .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
}

/* Notification */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.form-section-divider {
  grid-column: 1 / -1;
  border: none;
  border-top: 1px solid var(--border);
  margin: 6px 0;
}

.form-section-label {
  grid-column: 1 / -1;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  padding-top: 4px;
}

/* Action buttons in table */
.action-btns { display: flex; gap: 6px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ---- EMPLOYEE MODULE ---- */
.btn-import {
  background: linear-gradient(135deg, var(--accent2), #7c3aed);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.2s;
}
.btn-import:hover { opacity: 0.85; }

.dept-pill {
  display: inline-block;
  background: var(--surface3);
  color: var(--text);
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 12px;
  font-weight: 500;
}

.filter-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

/* ---- EMPLOYEE STATUS BADGES ---- */
.status-badge {
  display: inline-block;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
  transition: opacity 0.2s, transform 0.1s;
}
.status-badge:hover { opacity: 0.8; transform: scale(0.97); }
.status-employed {
  background: rgba(16, 185, 129, 0.15);
  color: #10b981;
  border: 1px solid rgba(16, 185, 129, 0.3);
}
.status-resigned {
  background: rgba(239, 68, 68, 0.12);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.3);
}

/* ---- INVENTORY IMPORT WARNINGS ---- */
.import-warn-row {
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
  border-left: 4px solid;
  font-size: 13px;
}
.import-warn-error {
  background: rgba(239,68,68,0.08);
  border-color: #ef4444;
}
.import-warn-warning {
  background: rgba(245,158,11,0.08);
  border-color: #f59e0b;
}
.import-warn-skip {
  background: rgba(100,116,139,0.08);
  border-color: #64748b;
}
.import-warn-header {
  font-weight: 600;
  margin-bottom: 4px;
}
.import-warn-msg {
  color: var(--text2);
  font-size: 12px;
  padding-left: 8px;
  margin-top: 2px;
}

/* ---- BULK DELETE ---- */
.bulk-bar {
  display: none;
  align-items: center;
  gap: 12px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px;
  padding: 10px 16px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.bulk-bar.visible { display: flex; }
.bulk-bar-count { font-weight: 700; color: #ef4444; font-size: 14px; }
.bulk-bar-info  { color: var(--text2); font-size: 13px; }
.btn-bulk-delete {
  background: #ef4444;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-left: auto;
  transition: opacity 0.2s;
  font-family: inherit;
}
.btn-bulk-delete:hover { opacity: 0.85; }
.btn-bulk-cancel {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
}
.btn-bulk-cancel:hover { opacity: 0.8; }
.row-checkbox {
  width: 16px; height: 16px;
  accent-color: #ef4444;
  cursor: pointer;
}
th.cb-col, td.cb-col { width: 36px; padding: 0 8px; text-align: center; }

</style>

<script>
// ============================================================
// DATA LAYER — Supabase Backend
// ============================================================

const SUPABASE_URL = 'https://fgobjyvfqloebeyvdlmw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnb2JqeXZmcWxvZWJleXZkbG13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzMxOTAsImV4cCI6MjA4ODYwOTE5MH0.WnYV2ixA4ekrXOPk8Uqrt57KS76DNhcRNMG3q_Q08PY';

const LOCATIONS = ['Head Office','Ambathale','Keragala','Wattala','Kadana','India','Indonesia'];

const MODULES = [
  { id:'wifi',      label:'WiFi Connections', icon:'📶' },
  { id:'inventory', label:'IT Inventory',     icon:'💻' },
  { id:'printers',  label:'Printers',          icon:'🖨️' },
  { id:'mobiles',   label:'Mobile Phones',     icon:'📱' },
  { id:'ip',        label:'IP Manager',         icon:'🌐' },
  { id:'systems',   label:'Systems Access',    icon:'🖥️' },
  { id:'employees', label:'Employees',          icon:'👥' }
];

async function sbFetch(path, options={}) {
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = { 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type':'application/json', 'Prefer':'return=representation', ...options.headers };
  const res = await fetch(url, {...options, headers});
  if (!res.ok) { console.error('Supabase error:', await res.text()); return null; }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

const DB = {
  // WIFI
  async getWifi(location) {
    const conns = await sbFetch(`wifi_connections?location=eq.${encodeURIComponent(location)}&order=created_at.asc`);
    if (!conns) return [];
    for (const c of conns) {
      const months = await sbFetch(`wifi_months?connection_id=eq.${c.id}&order=month.desc`);
      c.months = (months||[]).map(m=>({id:m.id,month:m.month,gbAmount:m.gb_amount,price:m.price,extraGb:m.extra_gb,extraCost:m.extra_cost,notes:m.notes}));
      c.accountNumber=c.account_number; c.subscriptionNumber=c.subscription_number;
      c.defaultGb=c.default_gb; c.defaultPrice=c.default_price;
    }
    return conns;
  },

function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function currentMonthLabel() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function formatMonth(ym) {
  if(!ym) return '';
  const [y,m]=ym.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function toast(msg,type='success') {
  const el=document.createElement('div');
  el.className='toast';
  el.style.borderColor=type==='error'?'var(--danger)':'var(--accent)';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

</script>

// Default users - change these passwords after first login

const USERS = [
  { username: 'admin',   password: 'Polydime@2024', role: 'admin',    name: 'IT Admin' },
  { username: 'itexec',  password: 'IT@exec2024',   role: 'admin',    name: 'IT Executive' },
  { username: 'viewer',  password: 'View@2024',     role: 'viewer',   name: 'Viewer' }
];

let currentUser = null;

function authInit() {
  const saved = sessionStorage.getItem('polydime_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  appInit();
  const ud = document.getElementById('user-display');
  if (ud) ud.textContent = currentUser.name;
}

function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const user = USERS.find(x => x.username === u && x.password === p);
  if (user) {
    currentUser = user;
    sessionStorage.setItem('polydime_user', JSON.stringify(user));
    errEl.style.display = 'none';
    showApp();
  } else {
    errEl.style.display = 'block';
    errEl.textContent = 'Invalid username or password.';
    document.getElementById('login-password').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('polydime_user');
  currentUser = null;

}

<script>
// ============================================================
// WIFI MODULE — Supabase version
// ============================================================

let wifiEditId = null;
let wifiCurrentLocation = '';

async function wifiRender(location) {
  wifiCurrentLocation = location;
  const el = document.getElementById('module-content');
  if (el) el.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text2);">⏳ Loading...</div>';
  const connections = await DB.getWifi(location);
  if (el) el.innerHTML = wifiHTML(location, connections) + wifiModal();
}

function wifiHTML(location, connections) {
  return `<div>
    <div class="section-header">
      <div><div class="section-title">📶 WiFi Connections</div>
      <div class="section-subtitle">${location} — ${connections.length} connection(s)</div></div>
      <button class="btn btn-secondary" onclick="wifiOpenAdd()">+ Add Connection</button>
    </div>
    ${connections.length === 0 ? `<div class="empty-state"><div class="icon">📶</div><h3>No connections yet</h3><p>Add a WiFi connection to get started</p></div>` :
      connections.map(c => wifiConnectionCard(c)).join('')}
  </div>`;
}

function wifiConnectionCard(conn) {
  const months = (conn.months || []).slice().sort((a,b) => b.month.localeCompare(a.month));
  const latest = months[0];
  return `
  <div class="wifi-connection-card card" style="padding:0;margin-bottom:16px;">
    <div class="wifi-connection-header">
      <div>
        <div class="wifi-conn-name">${conn.name}</div>
        <div class="wifi-conn-meta">Acc# ${conn.accountNumber} &nbsp;|&nbsp; ${conn.subscriptionNumber} &nbsp;|&nbsp;
          ${latest ? `<span class="badge badge-green">${latest.gbAmount} GB</span> &nbsp; LKR ${parseFloat(latest.price).toLocaleString()}` : 'No monthly data'}</div>
      </div>
      <div class="action-btns">
        <button class="btn btn-small btn-secondary" onclick="wifiAddMonth('${conn.id}')">+ Month</button>
        <button class="btn btn-small btn-secondary" onclick="wifiOpenEdit('${conn.id}')">Edit</button>
        <button class="btn btn-small btn-danger" onclick="wifiDelete('${conn.id}')">Del</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="wifi-months-table">
        <thead><tr><th>Month</th><th>GB Package</th><th>Base Price</th><th>Extra GB</th><th>Extra Cost</th><th>Total</th><th>Notes</th><th></th></tr></thead>
        <tbody>
          ${months.length === 0 ? `<tr><td colspan="8" style="text-align:center;color:var(--text2);padding:16px;">No monthly records</td></tr>` :
            months.map(m => `<tr>
              <td><strong>${formatMonth(m.month)}</strong></td>
              <td><span class="badge badge-blue">${m.gbAmount} GB</span></td>
              <td>LKR ${parseFloat(m.price).toLocaleString()}</td>
              <td>${m.extraGb ? m.extraGb+' GB' : '—'}</td>
              <td>${m.extraCost ? 'LKR '+parseFloat(m.extraCost).toLocaleString() : '—'}</td>
              <td><strong>LKR ${(parseFloat(m.price)+parseFloat(m.extraCost||0)).toLocaleString()}</strong></td>
              <td style="color:var(--text2);font-size:12px;">${m.notes||'—'}</td>
              <td><button class="btn btn-small btn-danger" onclick="wifiDeleteMonth('${conn.id}','${m.id}')">×</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function wifiModal() {
  return `
  <div id="wifi-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header"><div class="modal-title" id="wifi-modal-title">Add Connection</div><button class="btn-close" onclick="wifiCloseModal()">×</button></div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label>Connection Name</label><input id="wf-name" type="text" placeholder="e.g. Dialog Fiber Office"/></div>
          <div class="form-group"><label>Account Number</label><input id="wf-acc" type="text" placeholder="Account #"/></div>
          <div class="form-group"><label>Subscription Number</label><input id="wf-sub" type="text" placeholder="Subscription #"/></div>
          <div class="form-group"><label>Default GB Package</label><input id="wf-gb" type="number" placeholder="e.g. 100"/></div>
          <div class="form-group span2"><label>Fixed Monthly Price (LKR)</label><input id="wf-price" type="number" placeholder="e.g. 4500"/></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="wifiCloseModal()">Cancel</button>
        <button class="btn btn-primary" onclick="wifiSave()" style="width:auto">Save Connection</button>
      </div>
    </div>
  </div>
  <div id="wifi-month-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Add Monthly Record</div><button class="btn-close" onclick="document.getElementById('wifi-month-modal').style.display='none'">×</button></div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Base GB and price are auto-filled. Edit if package changed this month.</p>
        <input type="hidden" id="wm-conn-id"/>
        <div class="form-grid">
          <div class="form-group"><label>Month</label><input id="wm-month" type="month"/></div>
          <div class="form-group"><label>GB Package</label><input id="wm-gb" type="number"/></div>
          <div class="form-group"><label>Base Price (LKR)</label><input id="wm-price" type="number"/></div>
          <div class="form-group"><label>Extra GB Added</label><input id="wm-extra-gb" type="number" placeholder="0"/></div>
          <div class="form-group"><label>Extra Cost (LKR)</label><input id="wm-extra-cost" type="number" placeholder="0"/></div>
          <div class="form-group span2"><label>Notes</label><input id="wm-notes" type="text" placeholder="Package upgrade, extra top-up..."/></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('wifi-month-modal').style.display='none'">Cancel</button>
        <button class="btn btn-primary" onclick="wifiSaveMonth()" style="width:auto">Save Month</button>
      </div>
    </div>
  </div>`;
}

// Store connections in memory for edit lookups
let _wifiConnCache = [];

async function wifiOpenAdd() {
  wifiEditId = null;
  document.getElementById('wifi-modal-title').textContent = 'Add Connection';
  ['wf-name','wf-acc','wf-sub','wf-gb','wf-price'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('wifi-modal').style.display = 'flex';
}

async function wifiOpenEdit(id) {
  const connections = await DB.getWifi(wifiCurrentLocation);
  const conn = connections.find(c => c.id === id);
  if (!conn) return;
  wifiEditId = id;
  document.getElementById('wifi-modal-title').textContent = 'Edit Connection';
  document.getElementById('wf-name').value = conn.name;
  document.getElementById('wf-acc').value = conn.accountNumber;
  document.getElementById('wf-sub').value = conn.subscriptionNumber;
  document.getElementById('wf-gb').value = conn.defaultGb;
  document.getElementById('wf-price').value = conn.defaultPrice;
  document.getElementById('wifi-modal').style.display = 'flex';
}

function wifiCloseModal() { document.getElementById('wifi-modal').style.display = 'none'; }

async function wifiSave() {
  const name = document.getElementById('wf-name').value.trim();
  if (!name) { toast('Connection name is required', 'error'); return; }
  const conn = {
    id: wifiEditId || genId(),
    name, accountNumber: document.getElementById('wf-acc').value.trim(),
    subscriptionNumber: document.getElementById('wf-sub').value.trim(),
    defaultGb: document.getElementById('wf-gb').value,
    defaultPrice: document.getElementById('wf-price').value
  };
  toast('Saving...');
  await DB.saveWifiConnection(wifiCurrentLocation, conn);
  wifiCloseModal();
  toast('Connection saved!');
  wifiRender(wifiCurrentLocation);
}

async function wifiDelete(id) {
  if (!confirm('Delete this connection and all its monthly records?')) return;
  await DB.deleteWifiConnection(id);
  toast('Connection deleted');
  wifiRender(wifiCurrentLocation);
}

async function wifiAddMonth(connId) {
  const connections = await DB.getWifi(wifiCurrentLocation);
  const conn = connections.find(c => c.id === connId);
  if (!conn) return;
  document.getElementById('wm-conn-id').value = connId;
  document.getElementById('wm-month').value = currentMonthLabel();
  document.getElementById('wm-gb').value = conn.defaultGb;
  document.getElementById('wm-price').value = conn.defaultPrice;
  document.getElementById('wm-extra-gb').value = '';
  document.getElementById('wm-extra-cost').value = '';
  document.getElementById('wm-notes').value = '';
  document.getElementById('wifi-month-modal').style.display = 'flex';
}

async function wifiSaveMonth() {
  const connId = document.getElementById('wm-conn-id').value;
  const month = document.getElementById('wm-month').value;
  if (!month) { toast('Select a month', 'error'); return; }
  const record = {
    id: genId(), month,
    gbAmount: document.getElementById('wm-gb').value,
    price: document.getElementById('wm-price').value,
    extraGb: document.getElementById('wm-extra-gb').value,
    extraCost: document.getElementById('wm-extra-cost').value,
    notes: document.getElementById('wm-notes').value.trim()
  };
  toast('Saving...');
  await DB.saveWifiMonth(connId, wifiCurrentLocation, record);
  document.getElementById('wifi-month-modal').style.display = 'none';
  toast('Monthly record saved!');
  wifiRender(wifiCurrentLocation);
}

async function wifiDeleteMonth(connId, monthId) {
  await DB.deleteWifiMonth(monthId);
  toast('Month deleted');
  wifiRender(wifiCurrentLocation);
}

</script>

let invEmpList = [];   // loaded when modal opens

function invSimilarity(a, b) {
  a = a.toLowerCase().trim(); b = b.toLowerCase().trim();
  if (a === b) return 1;
  const aWords = a.split(/\s+/); const bWords = b.split(/\s+/);
  // First or last name exact match = high score
  for (const aw of aWords) for (const bw of bWords) {
    if (aw === bw && aw.length > 2) return 0.85;
  }
  // Starts-with
  if (b.startsWith(a) || a.startsWith(b)) return 0.8;
  // Character overlap (simple)
  const setA = new Set(a.replace(/\s/g,'')); const setB = new Set(b.replace(/\s/g,''));
  let inter = 0; setA.forEach(ch => { if(setB.has(ch)) inter++; });
  return inter / Math.max(setA.size, setB.size) * 0.7;
}

function invEmpSearch(query) {
  invEmpConfirmed = false;
  document.getElementById('inv-emp-confirm').style.display = 'none';
  const dd = document.getElementById('inv-emp-dropdown');
  if (!query || query.length < 1) { dd.style.display = 'none'; return; }
  const q = query.toLowerCase().trim();
  const scored = invEmpList
    .map(e => ({ e, score: invSimilarity(q, e.name) }))
    .filter(x => x.score > 0.2)
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);
  if (!scored.length) {
    dd.innerHTML = '<div style="padding:10px 14px;color:var(--text2);font-size:13px;">No matching employees found</div>';
    dd.style.display = 'block'; return;
  }
  dd.innerHTML = scored.map(({e, score}) => {
    const tag = score === 1 ? '✅ Exact match' : score >= 0.85 ? '🔵 Name match' : '🟡 Similar';
    return `<div onclick="invEmpSelect('${e.name.replace(/'/g,"\\'")}','${e.department||''}','${e.designation||''}')"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;"
      onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">
      <div>
        <strong style="font-size:13px;">${e.name}</strong>
        <span style="color:var(--text2);font-size:12px;margin-left:8px;">${e.department||''} ${e.designation?'· '+e.designation:''}</span>
      </div>
      <span style="font-size:11px;color:var(--text2);">${tag}</span>
    </div>`;
  }).join('');
  dd.style.display = 'block';
}

function invSimilarityScore(a, b) {
  a = a.toLowerCase().trim(); b = b.toLowerCase().trim();
  if (a === b) return 100;
  const aW = a.split(' '); const bW = b.split(' ');
  // Any word match
  let score = 0;
  for (const aw of aW) for (const bw of bW) {
    if (aw === bw && aw.length > 2) score += 40;
    else if (bw.includes(aw) && aw.length > 2) score += 20;
    else if (aw.includes(bw) && bw.length > 2) score += 20;
  }
  return Math.min(score, 99);
}

async function invImportExcel(input) {
  const file = input.files[0];
  if (!file) return;

  // Show progress overlay
  document.getElementById('inv-import-overlay').style.display = 'flex';
  document.getElementById('inv-import-status').textContent = 'Reading Excel file...';
  document.getElementById('inv-import-bar').style.width = '5%';
  document.getElementById('inv-import-count').textContent = '';
  document.getElementById('inv-import-warnings').innerHTML = '';

  try {
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data, { type: 'arraybuffer' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    // Auto-detect header row — skip label rows until 'Employee Name' is found
    let rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    if (rows.length > 0) {
      const firstKey = Object.keys(rows[0])[0] || '';
      if (firstKey !== 'Employee Name' && firstKey !== 'Employee') {
        // Header is on row 2 (template has a top label row)
        rows = XLSX.utils.sheet_to_json(sheet, { defval: '', range: 1 });
      }
    }

    if (rows.length === 0) {
      invImportDone(); toast('Excel file is empty', 'error'); input.value=''; return;
    }

    // Load existing employees for name validation
    document.getElementById('inv-import-status').textContent = 'Loading employee list for validation...';
    const employees = await DB.getEmployees(invCurrentLocation);
    const employeeNames = new Set(employees.map(e => e.name.trim().toLowerCase()));

    // Load existing inventory to check duplicates
    const existing = await DB.getInventory(invCurrentLocation);
    const existingEmployees = new Set(existing.map(i => i.employee.trim().toLowerCase()));

    const warnings = [];
    const toSave = [];

    // ---- VALIDATE EACH ROW ----
    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const rowNum = i + 2; // Excel row number (1=header)
      const rowWarnings = [];

      const employeeName = val(row, 'Employee Name', 'Employee', 'Name');
      const deviceType   = val(row, 'Device Type', 'Type');
      const brand        = val(row, 'Brand');
      const model        = val(row, 'Model');
      const serial       = val(row, 'Serial Number', 'Serial');
      const description  = val(row, 'Description', 'Desc');

      // --- SKIP instruction/notes rows silently ---
      if (!employeeName ||
          employeeName.toLowerCase().includes('write ') ||
          employeeName.toLowerCase().includes('required') ||
          employeeName.startsWith('📋') ||
          employeeName.toUpperCase().startsWith('NOTE')) {
        if (!employeeName) { warnings.push({ row: rowNum, name: '(blank)', type:'error', msgs: ['Employee Name is required — row skipped'] }); }
        continue;
      }

      // --- MUST-HAVE FIELDS ---
      if (!deviceType)   { rowWarnings.push('⚠️ Device Type is required (PC or Laptop)'); }
      if (!brand)        { rowWarnings.push('⚠️ Brand is required'); }
      if (!model)        { rowWarnings.push('⚠️ Model is required'); }

      const devType = deviceType.toString().trim();
      const isLaptop = devType.toLowerCase().includes('laptop');
      const isPC = devType.toLowerCase().includes('pc') || devType.toLowerCase().includes('desktop');

      if (!isLaptop && !isPC && deviceType) rowWarnings.push(`⚠️ Unknown Device Type "${deviceType}" — expected PC or Laptop`);

      // Laptop: serial number is MUST
      if (isLaptop && !serial) rowWarnings.push('❌ Serial Number is required for Laptops');

      // Employee name: just collect unmatched names, we'll resolve after parsing
      if (employeeName && employees.length > 0) {
        const empLower = employeeName.toLowerCase().trim();
        if (!employeeNames.has(empLower)) {
          // Mark as needing resolution — store original name
        }
      }

      // Duplicate check
      if (existingEmployees.has(employeeName.toLowerCase())) {
        rowWarnings.push(`⏭️ Already has a device in inventory — will be skipped`);
        warnings.push({ row: rowNum, name: employeeName, type: 'skip', msgs: rowWarnings });
        continue;
      }

      // Skip row if critical missing (device type, brand, model)
      if (!deviceType || !brand || !model || (isLaptop && !serial)) {
        if (rowWarnings.length > 0) warnings.push({ row: rowNum, name: employeeName, type: 'error', msgs: rowWarnings });
        continue;
      }

      if (rowWarnings.length > 0) warnings.push({ row: rowNum, name: employeeName, type: 'warning', msgs: rowWarnings });

      // Build item
      const item = {
        id: genId(),
        employee: employeeName,
        deviceType: isPC ? 'PC' : 'Laptop',
        brand, model,
        description,
        serialNumber: serial,
        ram: val(row, 'RAM', 'RAM (GB)'),
        storageType: val(row, 'Storage Type') || 'SSD',
        storageSize: val(row, 'Storage Size', 'Storage Size (GB)'),
        ssdSerial: val(row, 'SSD Serial', 'Storage Serial'),
        extraHdd: yesNo(val(row, 'Extra HDD')),
        extraHddSize: val(row, 'Extra HDD Size'),
        extraHddSerial: val(row, 'Extra HDD Serial'),
        mouseGiven: yesNo(val(row, 'Mouse', 'Mouse Given')),
        notes: val(row, 'Notes'),
      };

      if (isPC) {
        item.upsBrand     = val(row, 'UPS Brand');
        item.upsModel     = val(row, 'UPS Model');
        item.upsSize      = val(row, 'UPS Size');
        item.keyboard     = val(row, 'Keyboard', 'Keyboard Model');
        item.monitorBrand = val(row, 'Monitor Brand');
        item.monitorModel = val(row, 'Monitor Model');
        item.monitorSerial= val(row, 'Monitor Serial', 'Monitor Serial Number');
        item.vgaAdded     = yesNo(val(row, 'VGA', 'VGA Added'));
        item.vgaModel     = val(row, 'VGA Model');
      }

      toSave.push(item);
    }

    // ---- CHECK FOR UNMATCHED EMPLOYEES ----
    const unmatchedNames = [...new Set(
      toSave
        .filter(item => employees.length > 0 && !employeeNames.has((item.employee||'').toLowerCase().trim()))
        .map(item => item.employee)
    )];

    if (unmatchedNames.length > 0) {
      // Store everything for after resolution
      window._invPendingImport = toSave;
      window._invEmployeeList = employees;
      window._invUnmatched = unmatchedNames;
      window._invNameMap = {}; // will store resolved name mappings
      window._invWarnings = warnings;
      input.value = '';
      invShowNameResolver(unmatchedNames, employees, toSave.length);
      return;
    }

    // ---- SHOW WARNINGS BEFORE SAVING ----
    if (warnings.length > 0) {
      document.getElementById('inv-import-status').textContent = `Found ${warnings.length} issue(s). Review below then confirm.`;
      const warnHTML = warnings.map(w => `
        <div class="import-warn-row import-warn-${w.type}">
          <div class="import-warn-header">
            <span>${w.type==='error'?'❌':w.type==='skip'?'⏭️':'⚠️'} Row ${w.row}: <strong>${w.name}</strong></span>
          </div>
          ${w.msgs.map(m => `<div class="import-warn-msg">${m}</div>`).join('')}
        </div>`).join('');
      document.getElementById('inv-import-warnings').innerHTML = warnHTML;
      document.getElementById('inv-import-confirm-area').style.display = 'flex';
      document.getElementById('inv-import-confirm-text').textContent =
        toSave.length > 0
          ? `Proceed to import ${toSave.length} valid device(s)? (Issues above will be skipped)`
          : 'No valid rows to import. Please fix the Excel file and try again.';
      document.getElementById('inv-import-confirm-btn').style.display = toSave.length > 0 ? 'inline-block' : 'none';
      window._invPendingImport = toSave;
      input.value = '';
      return;
    }

    // No warnings — save directly
    await invDoSave(toSave, input);

  } catch (err) {
    invImportDone();
    toast('Error reading file: ' + err.message, 'error');
    input.value = '';
    console.error(err);
  }
}

async function invConfirmImport() {
  const toSave = window._invPendingImport || [];
  document.getElementById('inv-import-confirm-area').style.display = 'none';
  document.getElementById('inv-import-warnings').innerHTML = '';
  await invDoSave(toSave, null);
}

async function invDoSave(toSave, input) {
  if (toSave.length === 0) { invImportDone(); toast('Nothing to import', 'error'); return; }
  document.getElementById('inv-import-status').textContent = `Saving ${toSave.length} devices...`;
  document.getElementById('inv-import-bar').style.width = '10%';

  for (let i = 0; i < toSave.length; i++) {
    const item = toSave[i];
    await DB.saveInventoryItem(invCurrentLocation, item);
    const pct = Math.round(((i+1)/toSave.length)*100);
    document.getElementById('inv-import-bar').style.width = pct+'%';
    document.getElementById('inv-import-count').textContent = `${i+1} / ${toSave.length}`;
    document.getElementById('inv-import-status').textContent = `✅ Saved: ${item.employee}`;
  }

  invImportDone();
  toast(`✅ ${toSave.length} device(s) imported!`);
  if (input) input.value = '';
  window._invPendingImport = [];
  inventoryRender(invCurrentLocation);
}

function invImportDone() {
  document.getElementById('inv-import-overlay').style.display = 'none';
}

// ---- Helpers ----
function val(row, ...keys) {
  for (const k of keys) {
    const v = (row[k] || '').toString().trim();
    if (v) return v;
  }
  return '';
}

function yesNo(v) {
  return v.toLowerCase() === 'yes' || v === '1' || v.toLowerCase() === 'true';
}

function invTogglePCFields() {
  const isPC = document.getElementById('inv-type').value === 'PC';
  document.getElementById('inv-pc-fields').style.display = isPC ? 'grid' : 'none';
  document.getElementById('inv-serial-hint').textContent = isPC ? '(optional for PC)' : '(required for Laptop)';
  document.getElementById('inv-serial-hint').style.color = isPC ? 'var(--text2)' : 'var(--danger)';
}
function invToggleExtraHdd() { document.getElementById('inv-extra-hdd-fields').style.display = document.getElementById('inv-extra-hdd').checked ? 'grid' : 'none'; }
function invToggleVga() { document.getElementById('inv-vga-fields').style.display = document.getElementById('inv-vga').checked ? 'block' : 'none'; }

function invOpenAdd() {
  invEditId = null;
  invEmpConfirmed = false;
  invLoadEmpList();
  document.getElementById('inv-modal-title').textContent = 'Add Device';
  ['inv-employee','inv-brand','inv-model','inv-description','inv-serial','inv-ram','inv-storage-size','inv-ssd-serial','inv-extra-hdd-size','inv-extra-hdd-serial','inv-ups-brand','inv-ups-model','inv-ups-size','inv-keyboard','inv-monitor-brand','inv-monitor-model','inv-monitor-serial','inv-vga-model','inv-notes'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  ['inv-extra-hdd','inv-mouse','inv-vga'].forEach(id => { const el=document.getElementById(id); if(el) el.checked=false; });
  document.getElementById('inv-extra-hdd-fields').style.display='none';
  document.getElementById('inv-vga-fields').style.display='none';
  document.getElementById('inv-type').value='Laptop'; invTogglePCFields();
  document.getElementById('inv-modal').style.display='flex';
}

async function invOpenEdit(id) {
  await invLoadEmpList();
  const items = await DB.getInventory(invCurrentLocation);
  const item = items.find(i => i.id === id);
  if (!item) return;
  invEditId = id;
  document.getElementById('inv-modal-title').textContent = 'Edit Device';
  document.getElementById('inv-employee').value = item.employee||'';
  if (item.employee) { const e = invEmpList.find(x=>x.name===item.employee); invEmpSelect(item.employee, e?e.department:'', e?e.designation:''); }
  document.getElementById('inv-type').value = item.deviceType||'Laptop';
  document.getElementById('inv-brand').value = item.brand||'';
  document.getElementById('inv-model').value = item.model||'';
  document.getElementById('inv-serial').value = item.serialNumber||'';
  document.getElementById('inv-description').value = item.description||'';
  document.getElementById('inv-ram').value = item.ram||'';
  document.getElementById('inv-storage-type').value = item.storageType||'SSD';
  document.getElementById('inv-storage-size').value = item.storageSize||'';
  document.getElementById('inv-ssd-serial').value = item.ssdSerial||'';
  document.getElementById('inv-extra-hdd').checked = !!item.extraHdd;
  document.getElementById('inv-extra-hdd-fields').style.display = item.extraHdd?'grid':'none';
  document.getElementById('inv-extra-hdd-size').value = item.extraHddSize||'';
  document.getElementById('inv-extra-hdd-serial').value = item.extraHddSerial||'';
  document.getElementById('inv-mouse').checked = !!item.mouseGiven;
  document.getElementById('inv-ups-brand').value = item.upsBrand||'';
  document.getElementById('inv-ups-model').value = item.upsModel||'';
  document.getElementById('inv-ups-size').value = item.upsSize||'';
  document.getElementById('inv-keyboard').value = item.keyboard||'';
  document.getElementById('inv-monitor-brand').value = item.monitorBrand||'';
  document.getElementById('inv-monitor-model').value = item.monitorModel||'';
  document.getElementById('inv-monitor-serial').value = item.monitorSerial||'';
  document.getElementById('inv-vga').checked = !!item.vgaAdded;
  document.getElementById('inv-vga-fields').style.display = item.vgaAdded?'block':'none';
  document.getElementById('inv-vga-model').value = item.vgaModel||'';
  document.getElementById('inv-notes').value = item.notes||'';
  invTogglePCFields();
  document.getElementById('inv-modal').style.display='flex';
}

function invCloseModal() { document.getElementById('inv-modal').style.display='none'; }

async function invSave() {
  const employee = document.getElementById('inv-employee').value.trim();
  // Warn if employee not linked
  if (!invEmpConfirmed && employee) {
    const exact = invEmpList.find(e => e.name.toLowerCase() === employee.toLowerCase());
    if (!exact) {
      const top = invEmpList.map(e=>({e,s:invSimilarity(employee,e.name)})).sort((a,b)=>b.s-a.s)[0];
      const hint = top && top.s > 0.3 ? `\nDid you mean: "${top.e.name}"?` : '';
      if (!confirm(`"${employee}" was not found in the Employees list.${hint}\n\nSave anyway?`)) return;
    }
  }
  const deviceType = document.getElementById('inv-type').value;
  const brand = document.getElementById('inv-brand').value.trim();
  const model = document.getElementById('inv-model').value.trim();
  const serial = document.getElementById('inv-serial').value.trim();

  if (!employee) { toast('Employee name is required','error'); return; }
  if (!brand)    { toast('Brand is required','error'); return; }
  if (!model)    { toast('Model is required','error'); return; }
  if (deviceType === 'Laptop' && !serial) { toast('Serial number is required for Laptops','error'); return; }

  const item = {
    id: invEditId||genId(), employee, deviceType, brand, model,
    serialNumber: serial,
    description: document.getElementById('inv-description').value.trim(),
    ram: document.getElementById('inv-ram').value,
    storageType: document.getElementById('inv-storage-type').value,
    storageSize: document.getElementById('inv-storage-size').value,
    ssdSerial: document.getElementById('inv-ssd-serial').value.trim(),
    extraHdd: document.getElementById('inv-extra-hdd').checked,
    extraHddSize: document.getElementById('inv-extra-hdd-size').value,
    extraHddSerial: document.getElementById('inv-extra-hdd-serial').value.trim(),
    mouseGiven: document.getElementById('inv-mouse').checked,
    notes: document.getElementById('inv-notes').value.trim(),
  };
  if (deviceType === 'PC') {
    item.upsBrand = document.getElementById('inv-ups-brand').value.trim();
    item.upsModel = document.getElementById('inv-ups-model').value.trim();
    item.upsSize = document.getElementById('inv-ups-size').value.trim();
    item.keyboard = document.getElementById('inv-keyboard').value.trim();
    item.monitorBrand = document.getElementById('inv-monitor-brand').value.trim();
    item.monitorModel = document.getElementById('inv-monitor-model').value.trim();
    item.monitorSerial = document.getElementById('inv-monitor-serial').value.trim();
    item.vgaAdded = document.getElementById('inv-vga').checked;
    item.vgaModel = item.vgaAdded ? document.getElementById('inv-vga-model').value.trim() : '';
  }
  toast('Saving...'); await DB.saveInventoryItem(invCurrentLocation, item);
  invCloseModal(); toast('Device saved!'); inventoryRender(invCurrentLocation);
}

async function invDelete(id) {
  if (!confirm('Delete this device record?')) return;
  await DB.deleteInventoryItem(id); toast('Device deleted'); inventoryRender(invCurrentLocation);
}

</script>
<script>
// ============================================================
// PRINTERS MODULE — Supabase version
// ============================================================
let printerCurrentLocation = '';
let printerEditId = null;

async function printersRender(location) {

function printersHTML(location, printers) {
  return `<div>
    <div class="section-header">
      <div><div class="section-title">🖨️ Printers</div><div class="section-subtitle">${location} — ${printers.length} printer(s)</div></div>

function printerModal() {
  return `<div id="printer-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header"><div class="modal-title" id="printer-modal-title">Add Printer</div><button class="btn-close" onclick="printerCloseModal()">×</button></div>
      <div class="modal-body"><div class="form-grid">
        <div class="form-group"><label>Brand</label><input id="pr-brand" type="text" placeholder="HP, Canon, Epson..."/></div>
        <div class="form-group"><label>Model</label><input id="pr-model" type="text"/></div>
        <div class="form-group"><label>Serial Number</label><input id="pr-serial" type="text"/></div>
        <div class="form-group"><label>Assigned Department</label><input id="pr-dept" type="text"/></div>
        <div class="form-group"><div class="checkbox-group"><input type="checkbox" id="pr-color"/><label for="pr-color">Color Printer</label></div></div>
        <div class="form-group"><div class="checkbox-group"><input type="checkbox" id="pr-duplex"/><label for="pr-duplex">Duplex (Double-sided)</label></div></div>
        <div class="form-group span2"><div class="checkbox-group"><input type="checkbox" id="pr-network" onchange="printerToggleIP()"/><label for="pr-network">Network Printer</label></div></div>

      </div></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="printerCloseModal()">Cancel</button>
        <button class="btn btn-primary" onclick="printerSave()" style="width:auto">Save Printer</button>
      </div>
    </div>

}


function prRowCheck() {
  const cbs = document.querySelectorAll('.pr-row-cb');
  const checked = document.querySelectorAll('.pr-row-cb:checked');
  document.getElementById('pr-bulk-bar').classList.toggle('visible', checked.length > 0);
  document.getElementById('pr-bulk-count').textContent = checked.length + ' selected';
  document.getElementById('pr-check-all').indeterminate = checked.length > 0 && checked.length < cbs.length;
  document.getElementById('pr-check-all').checked = checked.length === cbs.length && cbs.length > 0;
}
function prToggleAll(cb) { document.querySelectorAll('.pr-row-cb').forEach(c => c.checked = cb.checked); prRowCheck(); }
function prBulkCancel() {
  document.querySelectorAll('.pr-row-cb').forEach(c => c.checked = false);
  document.getElementById('pr-check-all').checked = false;
  document.getElementById('pr-bulk-bar').classList.remove('visible');
}
async function prBulkDelete() {
  const ids = [...document.querySelectorAll('.pr-row-cb:checked')].map(c => c.dataset.id);
  if (!ids.length) return;
  if (!confirm(`Delete ${ids.length} printer(s)?`)) return;
  for (const id of ids) await DB.deletePrinter(id);
  toast(`🗑 ${ids.length} printer(s) deleted`);
  printersRender(printerCurrentLocation);
}

function printerToggleIP() { document.getElementById('pr-ip-field').style.display = document.getElementById('pr-network').checked ? 'grid' : 'none'; }

function printerOpenAdd() {
  printerEditId = null;
  document.getElementById('printer-modal-title').textContent = 'Add Printer';
  ['pr-brand','pr-model','pr-serial','pr-dept','pr-ip'].forEach(id => document.getElementById(id).value='');
  ['pr-color','pr-duplex','pr-network'].forEach(id => document.getElementById(id).checked=false);
  document.getElementById('pr-ip-field').style.display='none';
  document.getElementById('printer-modal').style.display='flex';
}

async function printerOpenEdit(id) {
  const printers = await DB.getPrinters(printerCurrentLocation);
  const p = printers.find(x => x.id === id);
  if (!p) return;
  printerEditId = id;
  document.getElementById('printer-modal-title').textContent = 'Edit Printer';
  document.getElementById('pr-brand').value = p.brand||'';
  document.getElementById('pr-model').value = p.model||'';
  document.getElementById('pr-serial').value = p.serialNumber||'';
  document.getElementById('pr-dept').value = p.department||'';
  document.getElementById('pr-color').checked = !!p.color;
  document.getElementById('pr-duplex').checked = !!p.duplex;
  document.getElementById('pr-network').checked = !!p.network;
  document.getElementById('pr-ip').value = p.ipAddress||'';
  document.getElementById('pr-ip-field').style.display = p.network?'grid':'none';
  document.getElementById('printer-modal').style.display='flex';
}

function printerCloseModal() { document.getElementById('printer-modal').style.display='none'; }

async function printerSave() {
  const brand = document.getElementById('pr-brand').value.trim();
  if (!brand) { toast('Brand is required','error'); return; }
  const item = { id: printerEditId||genId(), brand, model: document.getElementById('pr-model').value.trim(), serialNumber: document.getElementById('pr-serial').value.trim(), department: document.getElementById('pr-dept').value.trim(), color: document.getElementById('pr-color').checked, duplex: document.getElementById('pr-duplex').checked, network: document.getElementById('pr-network').checked, ipAddress: document.getElementById('pr-ip').value.trim() };
  toast('Saving...'); await DB.savePrinter(printerCurrentLocation, item);
  printerCloseModal(); toast('Printer saved!'); printersRender(printerCurrentLocation);
}

async function printerDelete(id) {
  if (!confirm('Delete this printer?')) return;
  await DB.deletePrinter(id); toast('Printer deleted'); printersRender(printerCurrentLocation);
}

</script>
